function analyze(items) {
  const total = items.reduce((a,b)=>a+b.qty_sold,0);
  return items.map(item => {
    const velocity = item.qty_sold/12;
    const monthsLeft = velocity>0 ? item.units_on_hand/velocity : 999;
    const share = ((item.qty_sold/total)*100).toFixed(1);
    let status,label;
    if(item.qty_sold<=2){status="dead";label="Dead Stock";}
    else if(monthsLeft>=8||(item.qty_sold<15&&item.units_on_hand>80)){status="risk";label="At Risk";}
    else if(monthsLeft>=4){status="watch";label="Watch";}
    else{status="healthy";label="Healthy";}
    return {...item,velocity:Math.round(velocity*10)/10,monthsLeft:monthsLeft===999?"∞":Math.round(monthsLeft*10)/10,share,status,label};
  });
}

function Badge({status,label}){
  const s=STATUS_STYLES[status];
  return(
    <span style={{display:"inline-flex",alignItems:"center",gap:5,background:s.bg,border:`1px solid ${s.border}`,color:s.color,borderRadius:20,padding:"3px 10px",fontSize:10,fontFamily:"'IBM Plex Mono',monospace",fontWeight:700,letterSpacing:0.5,textTransform:"uppercase",whiteSpace:"nowrap"}}>
      <span style={{width:5,height:5,borderRadius:"50%",background:s.border,flexShrink:0}}/>
      {label}
    </span>
  );
}

function YOY({pct}){
  const color=pct>0?"#2e7d32":pct<0?"#cc0000":"#b37500";
  const arrow=pct>0?"▲":pct<0?"▼":"—";
  return <span style={{fontSize:9,fontFamily:"'IBM Plex Mono',monospace",color,marginLeft:5,fontWeight:700}}>{arrow} {Math.abs(pct)}% YOY</span>;
}

function StatCards({items,tabKey}){

  const yoy=TAB_STATS[tabKey];
  const deadItems=items.filter(d=>d.status==="dead"||d.status==="risk");
  const deadInventoryCost=deadItems.reduce((a,b)=>{
    const costPerUnit=b.amount/b.qty_sold*(1-(b.margin/100));
    return a+(costPerUnit*b.units_on_hand);
  },0);
  const deadUnits=deadItems.reduce((a,b)=>a+b.units_on_hand,0);

  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>
        {[{label:"Dead Stock",value:counts.dead,color:"#cc0000",sub:"Needs action"},{label:"At Risk",value:counts.risk,color:"#e65100",sub:"Overstocked"},{label:"Watch List",value:counts.watch,color:"#b37500",sub:"Slowing"},{label:"Healthy",value:counts.healthy,color:"#2e7d32",sub:"Moving well"}].map(c=>(

            <div style={{fontSize:9,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{c.label}</div>
            <div style={{fontSize:24,fontWeight:800,color:c.color,fontFamily:"'Montserrat',sans-serif",lineHeight:1}}>{c.value}</div>
            <div style={{fontSize:9,color:"#bbb",fontFamily:"'IBM Plex Mono',monospace",marginTop:4}}>{c.sub}</div>
          </div>
        ))}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:16}}>
        <div style={{background:"#f8f8f8",border:"1px solid #e8e8e8",borderRadius:12,padding:"14px 18px"}}>
          <div style={{fontSize:9,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Total Revenue <YOY pct={yoy.revYOY}/></div>

        </div>

          <div style={{fontSize:9,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>Units Sold <YOY pct={yoy.unitsYOY}/></div>

function Table({items,tabKey}){
  const [filter,setFilter]=React.useState("all");
  const [vendor,setVendor]=React.useState("all");
  const [selected,setSelected]=React.useState(null);
  const statusOrder={dead:0,risk:1,watch:2,healthy:3};
  const vendors=["all",...Array.from(new Set(items.map(d=>d.vendor)))];
  const filtered=items.filter(d=>filter==="all"||d.status===filter).filter(d=>vendor==="all"||d.vendor===vendor).sort((a,b)=>statusOrder[a.status]-statusOrder[b.status]);
  const sel=selected?items.find(d=>d.description===selected):null;

  const deadItems=items.filter(d=>d.status==="dead"||d.status==="risk");
  const deadInventoryCost=deadItems.reduce((a,b)=>{
    const costPerUnit=b.amount/b.qty_sold*(1-(b.margin/100));
    return a+(costPerUnit*b.units_on_hand);
  },0);
  const deadUnits=deadItems.reduce((a,b)=>a+b.units_on_hand,0);

  return(
    <div>
      <StatCards items={items} tabKey={tabKey}/>

      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"nowrap",overflowX:"auto"}}>
        {[{k:"all",l:"All"},{k:"dead",l:"Dead Stock"},{k:"risk",l:"At Risk"},{k:"watch",l:"Watch"},{k:"healthy",l:"Healthy"}].map(f=>(
          <button key={f.k} onClick={()=>setFilter(f.k)} style={{background:filter===f.k?"#111":"#fff",border:"1px solid #ddd",color:filter===f.k?"#fff":"#111",borderRadius:8,padding:"6px 14px",fontSize:11,fontFamily:"'Montserrat',sans-serif",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"}}>{f.l}</button>
        ))}
        <select value={vendor} onChange={e=>setVendor(e.target.value)} style={{background:"#fff",border:"1px solid #ddd",color:"#111",borderRadius:8,padding:"6px 10px",fontSize:11,fontFamily:"'Montserrat',sans-serif",cursor:"pointer",fontWeight:600}}>
          {vendors.map(v=><option key={v} value={v}>{v==="all"?"All Vendors":v}</option>)}
        </select>
      </div>

      {/* Dead Stock Alert - right above the table */}
      {deadInventoryCost > 0 && (
        <div style={{background:"#fff",border:"1px solid #ffcdd2",borderLeft:"4px solid #cc0000",borderRadius:8,padding:"10px 16px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontSize:9,color:"#999",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1.5,textTransform:"uppercase",marginBottom:2}}>Dead Stock Alert</div>
            <div style={{fontSize:12,color:"#333",fontFamily:"'Montserrat',sans-serif",fontWeight:500}}>
              <span style={{color:"#cc0000",fontWeight:700}}>{deadItems.length} SKUs</span> · <span style={{color:"#cc0000",fontWeight:700}}>{deadUnits.toLocaleString()} units</span> with little to no sales velocity
            </div>
          </div>
          <div style={{textAlign:"right",flexShrink:0,marginLeft:20}}>
            <div style={{fontSize:9,color:"#999",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>Capital at risk</div>
            <div style={{fontSize:18,fontWeight:800,color:"#cc0000",fontFamily:"'Montserrat',sans-serif",lineHeight:1}}>${Math.round(deadInventoryCost).toLocaleString()}</div>
          </div>
        </div>
      )}

      <div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"130px 1fr 100px 60px 70px 70px 70px",padding:"10px 16px",background:"#f4f4f4",borderBottom:"1px solid #e8e8e8",fontSize:9,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1.5,textTransform:"uppercase"}}>
          <span>Vendor</span><span>Description</span><span>Status</span>
          <span style={{textAlign:"right"}}>Sold</span>
          <span style={{textAlign:"right"}}>On Hand</span>
          <span style={{textAlign:"right"}}>Mo. Left</span>
          <span style={{textAlign:"right"}}>Margin</span>
        </div>
        {filtered.map((item,i)=>(
          <div key={item.description+i}>
            <div onClick={()=>setSelected(selected===item.description?null:item.description)} style={{display:"grid",gridTemplateColumns:"130px 1fr 100px 60px 70px 70px 70px",padding:"11px 16px",borderBottom:i<filtered.length-1?"1px solid #f4f4f4":"none",background:selected===item.description?"#f9f9f9":i%2===0?"#fff":"#fafafa",cursor:"pointer",alignItems:"center"}}>
              <span style={{fontSize:10,color:"#888",fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{item.vendor}</span>
              <span style={{fontSize:12,color:"#111",fontWeight:600,paddingRight:12}}>{item.description}</span>
              <div><Badge status={item.status} label={item.label}/></div>
              <span style={{textAlign:"right",fontSize:12,fontWeight:700,color:"#111",fontFamily:"'IBM Plex Mono',monospace"}}>{item.qty_sold}</span>
              <span style={{textAlign:"right",fontSize:12,color:"#666",fontFamily:"'IBM Plex Mono',monospace"}}>{item.units_on_hand}</span>
              <span style={{textAlign:"right",fontSize:12,fontWeight:700,fontFamily:"'IBM Plex Mono',monospace",color:item.monthsLeft==="∞"?"#cc0000":typeof item.monthsLeft==="number"&&item.monthsLeft>=8?"#e65100":item.monthsLeft>=4?"#b37500":"#2e7d32"}}>{item.monthsLeft==="∞"?"∞":`${item.monthsLeft}mo`}</span>
              <span style={{textAlign:"right",fontSize:12,color:"#2e7d32",fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>{item.margin}%</span>
            </div>
            {selected===item.description&&sel&&(
              <div style={{padding:"16px 24px",background:"#f9f9f9",borderBottom:"1px solid #e8e8e8"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:12}}>

                    <div key={s.l} style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:8,padding:"10px 14px"}}>
                      <div style={{fontSize:9,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1,marginBottom:4}}>{s.l}</div>
                      <div style={{fontSize:18,fontWeight:700,color:"#111",fontFamily:"'Montserrat',sans-serif"}}>{s.v}</div>
                    </div>
                  ))}
                </div>
                <div style={{padding:"12px 16px",borderRadius:8,background:STATUS_STYLES[sel.status].bg,border:`1px solid ${STATUS_STYLES[sel.status].border}22`}}>
                  <div style={{fontSize:9,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,marginBottom:4}}>SHELFCADDIE RECOMMENDATION</div>
                  <div style={{fontSize:12,color:"#111",lineHeight:1.6,fontFamily:"'Montserrat',sans-serif"}}>
                    {sel.status==="dead"&&`Only ${sel.qty_sold} unit(s) sold YTD. Consider returning to vendor, marking down, or removing from next order cycle.`}
                    {sel.status==="risk"&&`At ${sel.velocity} units/month velocity, you have ${sel.monthsLeft} months of stock on hand. Pause reorders and reduce rep allocation.`}
                    {sel.status==="watch"&&`Selling at ${sel.velocity} units/month with ${sel.monthsLeft} months remaining. Monitor closely — do not increase order quantity.`}
                    {sel.status==="healthy"&&`Strong performer at ${sel.velocity} units/month. Consider increasing reorder buffer to avoid stockouts during peak season.`}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

  const [loggedIn,setLoggedIn]=React.useState(false);
  const [user,setUser]=React.useState("");
  const [pass,setPass]=React.useState("");
  const [error,setError]=React.useState("");
  const [loading,setLoading]=React.useState(false);
  const [tab,setTab]=React.useState("all");

  const all=analyze(ALL_DATA);
  const balls=analyze(BALLS_DATA);
  const gloves=analyze(GLOVES_DATA);
  const bags=analyze(BAGS_DATA);
  const hats=analyze(HATS_DATA);
  const hardgoods=analyze(HARDGOODS_DATA);
  const shirts=analyze(SHIRTS_DATA);

  const login=()=>{
    if(user.trim().toLowerCase()==="head pro"&&pass.trim().toLowerCase()==="quantum"){
      setLoading(true);
      setTimeout(()=>{setLoading(false);setLoggedIn(true);},1200);
    }else{setError("Invalid credentials. Please try again.");}
  };

  if(!loggedIn) return(
    <div style={{minHeight:"100vh",background:"#f5f5f5",display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{background:"#fff",border:"1px solid #e8e8e8",borderRadius:20,padding:"48px 52px",width:"90%",maxWidth:420,boxShadow:"0 4px 24px rgba(0,0,0,0.06)"}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{width:52,height:52,background:"linear-gradient(135deg,#1a4a2e,#2d7a4f)",borderRadius:14,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:14}}>
            <span style={{color:"#fff",fontSize:22,fontWeight:800,fontFamily:"'Montserrat',sans-serif"}}>SC</span>
          </div>
          <div style={{fontSize:22,fontWeight:800,fontFamily:"'Montserrat',sans-serif",color:"#111",letterSpacing:-0.5}}>ShelfCaddie</div>
          <div style={{fontSize:9,color:"#bbb",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:3,marginTop:4}}>INVENTORY INTELLIGENCE</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontSize:10,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,marginBottom:6}}>USERNAME</div>
            <input value={user} onChange={e=>{setUser(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter username" style={{width:"100%",background:"#f8f8f8",border:"1px solid #e8e8e8",borderRadius:10,padding:"12px 14px",color:"#111",fontSize:13}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#888",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,marginBottom:6}}>PASSWORD</div>
            <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="Enter password" style={{width:"100%",background:"#f8f8f8",border:"1px solid #e8e8e8",borderRadius:10,padding:"12px 14px",color:"#111",fontSize:13}}/>
          </div>
          {error&&<div style={{fontSize:11,color:"#cc0000",fontFamily:"'IBM Plex Mono',monospace",textAlign:"center"}}>{error}</div>}
          <button onClick={login} style={{background:"#111",border:"none",borderRadius:10,padding:"14px",color:"#fff",fontSize:13,fontWeight:700,marginTop:6,cursor:"pointer",opacity:loading?0.7:1}}>
            {loading?"Signing in...":"Sign In"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:9,color:"#ccc",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2}}>POWERED BY SHELFCADDIE</div>
      </div>
    </div>
  );

  const tabs=[
    {k:"all",l:"All",data:all},
    {k:"balls",l:"Golf Balls",data:balls},
    {k:"gloves",l:"Gloves",data:gloves},
    {k:"bags",l:"Bags",data:bags},
    {k:"hats",l:"Hats",data:hats},
    {k:"hardgoods",l:"Hard Goods",data:hardgoods},
    {k:"shirts",l:"Shirts",data:shirts},
  ];
  const current=tabs.find(t=>t.k===tab);

  return(
    <div style={{minHeight:"100vh",background:"#fff"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e8e8e8",padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:60,boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:30,height:30,background:"linear-gradient(135deg,#1a4a2e,#2d7a4f)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <span style={{color:"#fff",fontSize:11,fontWeight:800,fontFamily:"'Montserrat',sans-serif"}}>SC</span>
          </div>
          <div>
            <div style={{fontSize:15,fontWeight:800,fontFamily:"'Montserrat',sans-serif",letterSpacing:-0.5,lineHeight:1,color:"#111"}}>ShelfCaddie</div>
            <div style={{fontSize:8,color:"#bbb",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2}}>INVENTORY INTELLIGENCE</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:"#111",fontWeight:700}}>TPC Sawgrass</div>
            <div style={{fontSize:9,color:"#bbb",fontFamily:"'IBM Plex Mono',monospace"}}>head pro</div>
          </div>
          <button onClick={()=>setLoggedIn(false)} style={{background:"#f4f4f4",border:"1px solid #e8e8e8",color:"#111",borderRadius:8,padding:"5px 12px",fontSize:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1,cursor:"pointer",fontWeight:700}}>SIGN OUT</button>
        </div>
      </div>

      <div style={{padding:"24px 32px",maxWidth:1400,margin:"0 auto"}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:9,color:"#bbb",fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,marginBottom:4}}>2026 YTD · NORTHSTAR POS</div>
          <h1 style={{fontSize:22,fontFamily:"'Montserrat',sans-serif",fontWeight:800,color:"#111",letterSpacing:-0.5}}>TPC Sawgrass — Inventory Dashboard</h1>
        </div>

        <div style={{display:"flex",gap:2,marginBottom:20,background:"#f4f4f4",padding:4,borderRadius:10,border:"1px solid #e8e8e8",overflowX:"auto",whiteSpace:"nowrap"}}>
          {tabs.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{background:tab===t.k?"#111":"transparent",border:"1px solid transparent",color:tab===t.k?"#fff":"#111",borderRadius:7,padding:"6px 14px",fontSize:11,fontFamily:"'Montserrat',sans-serif",fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0}}>
              {t.l}
            </button>
          ))}
        </div>

        <Table items={current.data} tabKey={tab}/>

        <div style={{marginTop:24,textAlign:"center",color:"#ddd",fontSize:9,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2}}>
          SHELFCADDIE · AI INVENTORY INTELLIGENCE FOR GOLF PRO SHOPS · 2026
        </div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>

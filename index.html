function analyze(items){
  const total=items.reduce((a,b)=>a+b.qty_sold,0);
  return items.map(item=>{
    const velocity=item.qty_sold/12;
    const monthsLeft=velocity>0?item.units_on_hand/velocity:999;
    const share=((item.qty_sold/total)*100).toFixed(1);
    let status,label;
    if(item.qty_sold<=2){status="dead";label="Dead Stock";}
    else if(monthsLeft>=8||(item.qty_sold<15&&item.units_on_hand>80)){status="risk";label="At Risk";}
    else if(monthsLeft>=4){status="watch";label="Watch";}
    else{status="healthy";label="Healthy";}
    return{...item,velocity:Math.round(velocity*10)/10,monthsLeft:monthsLeft===999?"∞":Math.round(monthsLeft*10)/10,share,status,label};
  });
}

function aggregatePerf(data){
  const skus={};
  data.forEach(r=>{
    const key=r.description;
    if(!skus[key])skus[key]={description:r.description,vendor:r.vendor,totalQty:0,totalRevenue:0,margin:r.margin,monthly:{}};
    skus[key].totalQty+=r.qty;skus[key].totalRevenue+=r.revenue;
    skus[key].monthly[r.month]=(skus[key].monthly[r.month]||0)+r.qty;
  });
  return Object.values(skus).sort((a,b)=>b.totalRevenue-a.totalRevenue);
}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14}}>
          {DASHBOARD_SCREENS.slice(2).map(d=>(
            <button key={d.k} onClick={()=>setScreen(d.k)} style={{background:t.cardBg,border:`1px solid ${t.border}`,borderRadius:16,padding:"24px 20px",cursor:"pointer",textAlign:"left",boxShadow:`0 2px 12px ${t.shadow}`}}>
              <div style={{width:38,height:38,background:d.gradient,borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",marginBottom:12}}><span style={{color:"#fff",fontSize:13,fontWeight:800}}>{d.initials}</span></div>
              <div style={{fontSize:13,fontWeight:800,color:t.text,marginBottom:6}}>{d.label}</div>
              <div style={{fontSize:10,color:t.textSub,lineHeight:1.5,marginBottom:10}}>{d.subtitle}</div>
              <div style={{fontSize:9,color:d.accentColor,fontFamily:"'IBM Plex Mono',monospace",fontWeight:600,letterSpacing:1}}>VIEW →</div>

        <div style={{display:"flex",alignItems:"center"}}>
          <Logo dark={dark}/>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>

          <ThemeToggle dark={dark} setDark={setDark} t={t}/>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:12,color:t.text,fontWeight:700}}>Brookhaven Golf & CC</div>
            <div style={{fontSize:9,color:t.textMuted,fontFamily:"'IBM Plex Mono',monospace"}}>head pro</div>
          </div>
          <div style={{textAlign:"right",borderLeft:`1px solid ${t.border}`,paddingLeft:12}}>
            <div style={{fontSize:8,color:t.textMuted,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>Last Synced</div>
            <div style={{fontSize:9,color:dark?"#22cc66":"#2e7d32",fontFamily:"'IBM Plex Mono',monospace",fontWeight:600}}>Today · 6:42 AM</div>
            <div style={{fontSize:8,color:t.textMuted,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:0.5}}>NorthStar POS</div>
          </div>
          <button onClick={()=>setScreen("login")} style={{background:t.cardBg2,border:`1px solid ${t.border}`,color:t.text,borderRadius:8,padding:"5px 12px",fontSize:10,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:1,cursor:"pointer",fontWeight:700}}>SIGN OUT</button>
        </div>
      </div>
      <div style={{padding:"24px 32px",maxWidth:1400,margin:"0 auto"}}>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:9,color:t.textMuted,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2,marginBottom:4}}>2026 YTD · NORTHSTAR POS</div>
          <h1 style={{fontSize:22,fontFamily:"'Montserrat',sans-serif",fontWeight:800,color:t.text,letterSpacing:-0.5}}>Brookhaven Golf & CC — {dashTitles[screen]}</h1>
        </div>
        {screen==="proshop"&&<ProShopDashboard dark={dark} t={t}/>}
        {screen==="perf"&&<PerfDashboard dark={dark} t={t}/>}
        {screen==="members"&&<MemberDashboard dark={dark} t={t}/>}
        
        {screen==="reorder"&&<ReorderDashboard dark={dark} t={t}/>}
        <div style={{marginTop:24,textAlign:"center",color:t.textMuted,fontSize:9,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:2}}>SHELFCADDIE · AI INVENTORY INTELLIGENCE FOR GOLF PRO SHOPS · 2026</div>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>

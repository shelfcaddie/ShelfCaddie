function analyze(items) {
  const total = items.reduce((a,b) => a+b.qty_sold, 0);
  return items.map(item => {
    const velocity = item.qty_sold / 12;
    const monthsLeft = velocity > 0 ? item.units_on_hand / velocity : 999;
    const share = ((item.qty_sold / total) * 100).toFixed(1);
    let status, label;
    if (item.qty_sold <= 2) { status="dead"; label="Dead Stock"; }
    else if (monthsLeft >= 8 || (item.qty_sold < 20 && item.units_on_hand > 60)) { status="risk"; label="At Risk"; }
    else if (monthsLeft >= 4) { status="watch"; label="Watch"; }
    else { status="healthy"; label="Healthy"; }
    return { ...item, velocity: Math.round(velocity*10)/10, monthsLeft: monthsLeft===999?"∞":Math.round(monthsLeft*10)/10, share, status, label };
  });
}

const STATUS_STYLES = {
  dead:    { bg:"#1a0000", border:"#ff2222", color:"#ff6666", dot:"#ff2222" },
  risk:    { bg:"#1a0a00", border:"#ff8800", color:"#ffaa44", dot:"#ff8800" },
  watch:   { bg:"#1a1a00", border:"#ddcc00", color:"#eedc44", dot:"#ddcc00" },
  healthy: { bg:"#001a08", border:"#22cc66", color:"#44ee88", dot:"#22cc66" },
};

function Badge({status, label}) {
  const s = STATUS_STYLES[status];
  return (
    <span style={{display:"inline-flex",alignItems:"center",gap:5,background:s.bg,border:`1px solid ${s.border}`,color:s.color,borderRadius:20,padding:"3px 10px",fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:600,letterSpacing:1,textTransform:"uppercase",whiteSpace:"nowrap"}}>
      <span style={{width:5,height:5,borderRadius:"50%",background:s.dot,flexShrink:0}}/>
      {label}
    </span>
  );
}

function Card({label, value, color, sub}) {
  return (
    <div style={{background:"#0d0d0d",border:"1px solid #1e1e1e",borderRadius:12,padding:"16px 20px"}}>
      <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2,textTransform:"uppercase",marginBottom:4}}>{label}</div>
      <div style={{fontSize:28,fontWeight:800,color,fontFamily:"'Playfair Display',serif",lineHeight:1}}>{value}</div>
      {sub && <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",marginTop:4}}>{sub}</div>}
    </div>
  );
}

function Table({items}) {
  const [filter, setFilter] = React.useState("all");
  const [vendor, setVendor] = React.useState("all");
  const [selected, setSelected] = React.useState(null);
  const statusOrder = {dead:0,risk:1,watch:2,healthy:3};
  const vendors = ["all",...Array.from(new Set(items.map(d=>d.vendor)))];
  const filtered = items.filter(d=>filter==="all"||d.status===filter).filter(d=>vendor==="all"||d.vendor===vendor).sort((a,b)=>statusOrder[a.status]-statusOrder[b.status]);
  const counts = {dead:items.filter(d=>d.status==="dead").length,risk:items.filter(d=>d.status==="risk").length,watch:items.filter(d=>d.status==="watch").length,healthy:items.filter(d=>d.status==="healthy").length};
  const totalRev = items.reduce((a,b)=>a+b.amount,0);
  const avgMargin = (items.reduce((a,b)=>a+b.margin,0)/items.length).toFixed(1);
  const totalUnits = items.reduce((a,b)=>a+b.qty_sold,0);
  const sel = selected ? items.find(d=>d.description===selected) : null;

  return (
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
        <Card label="Dead Stock" value={counts.dead} color="#ff4444" sub="Needs action"/>
        <Card label="At Risk" value={counts.risk} color="#ff8800" sub="Overstocked"/>
        <Card label="Watch List" value={counts.watch} color="#ddcc00" sub="Slowing"/>
        <Card label="Healthy" value={counts.healthy} color="#22cc66" sub="Moving well"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,marginBottom:20}}>
        <Card label="Total Revenue" value={`$${totalRev.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`} color="#4a9eff" sub="Full year 2025"/>
        <Card label="Units Sold" value={totalUnits.toLocaleString()} color="#aa77ff" sub="Full year 2025"/>
        <Card label="Avg Margin" value={`${avgMargin}%`} color="#22cc66" sub="Blended"/>
      </div>

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[{k:"all",l:"All"},{k:"dead",l:"🔴 Dead"},{k:"risk",l:"🟠 At Risk"},{k:"watch",l:"🟡 Watch"},{k:"healthy",l:"🟢 Healthy"}].map(f=>(
          <button key={f.k} onClick={()=>setFilter(f.k)} style={{background:filter===f.k?"#1e1e1e":"transparent",border:filter===f.k?"1px solid #333":"1px solid #1a1a1a",color:filter===f.k?"#fff":"#555",borderRadius:8,padding:"5px 12px",fontSize:11,fontFamily:"'DM Mono',monospace"}}>{f.l}</button>
        ))}
        <select value={vendor} onChange={e=>setVendor(e.target.value)} style={{background:"#0d0d0d",border:"1px solid #1e1e1e",color:"#aaa",borderRadius:8,padding:"5px 10px",fontSize:11,fontFamily:"'DM Mono',monospace"}}>
          {vendors.map(v=><option key={v} value={v}>{v==="all"?"All Vendors":v}</option>)}
        </select>
      </div>

      <div style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:12,overflow:"hidden"}}>
        <div style={{display:"grid",gridTemplateColumns:"130px 1fr 100px 60px 70px 70px 70px",padding:"10px 16px",background:"#0d0d0d",borderBottom:"1px solid #1a1a1a",fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:1.5,textTransform:"uppercase"}}>
          <span>Vendor</span><span>Description</span><span>Status</span>
          <span style={{textAlign:"right"}}>Sold</span>
          <span style={{textAlign:"right"}}>On Hand</span>
          <span style={{textAlign:"right"}}>Mo. Left</span>
          <span style={{textAlign:"right"}}>Margin</span>
        </div>
        {filtered.map((item,i)=>(
          <div key={item.description}>
            <div onClick={()=>setSelected(selected===item.description?null:item.description)} style={{display:"grid",gridTemplateColumns:"130px 1fr 100px 60px 70px 70px 70px",padding:"12px 16px",borderBottom:i<filtered.length-1?"1px solid #111":"none",background:selected===item.description?"#111":i%2===0?"#0a0a0a":"#0c0c0c",cursor:"pointer",alignItems:"center"}}>
              <span style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace"}}>{item.vendor}</span>
              <span style={{fontSize:12,color:"#ddd",fontWeight:500,paddingRight:12}}>{item.description}</span>
              <div><Badge status={item.status} label={item.label}/></div>
              <span style={{textAlign:"right",fontSize:13,fontWeight:600,color:"#eee",fontFamily:"'DM Mono',monospace"}}>{item.qty_sold}</span>
              <span style={{textAlign:"right",fontSize:12,color:"#888",fontFamily:"'DM Mono',monospace"}}>{item.units_on_hand}</span>
              <span style={{textAlign:"right",fontSize:12,fontWeight:600,fontFamily:"'DM Mono',monospace",color:item.monthsLeft==="∞"?"#ff4444":typeof item.monthsLeft==="number"&&item.monthsLeft>=8?"#ff8800":item.monthsLeft>=4?"#ddcc00":"#22cc66"}}>{item.monthsLeft==="∞"?"∞":`${item.monthsLeft}mo`}</span>
              <span style={{textAlign:"right",fontSize:12,color:"#22cc66",fontFamily:"'DM Mono',monospace"}}>{item.margin}%</span>
            </div>
            {selected===item.description && sel && (
              <div style={{padding:"20px 24px",background:"#0f0f0f",borderBottom:"1px solid #1a1a1a"}}>
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:16}}>
                  {[{l:"Units Sold",v:sel.qty_sold},{l:"Revenue",v:`$${sel.amount.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})}`},{l:"Margin",v:`${sel.margin}%`},{l:"Category Share",v:`${sel.share}%`}].map(s=>(
                    <div key={s.l} style={{background:"#0a0a0a",border:"1px solid #1a1a1a",borderRadius:8,padding:"12px 14px"}}>
                      <div style={{fontSize:9,color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:1,marginBottom:4}}>{s.l}</div>
                      <div style={{fontSize:20,fontWeight:700,fontFamily:"'Playfair Display',serif"}}>{s.v}</div>
                    </div>
                  ))}
                </div>
                <div style={{padding:"14px 18px",borderRadius:10,background:sel.status==="dead"?"#1a0000":sel.status==="risk"?"#1a0a00":sel.status==="watch"?"#1a1500":"#001a08",border:`1px solid ${sel.status==="dead"?"#ff222233":sel.status==="risk"?"#ff880033":sel.status==="watch"?"#ddcc0033":"#22cc6633"}`}}>
                  <div style={{fontSize:9,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>SHELFCADDIE RECOMMENDATION</div>
                  <div style={{fontSize:13,color:"#ccc",lineHeight:1.6}}>
                    {sel.status==="dead"&&`⚠️ Only ${sel.qty_sold} unit(s) sold all year. Consider returning to vendor, marking down, or removing from next order.`}
                    {sel.status==="risk"&&`🔶 At ${sel.velocity} units/month velocity, you have ${sel.monthsLeft} months of stock. Pause reorders and reduce rep allocation.`}
                    {sel.status==="watch"&&`👁 Selling at ${sel.velocity} units/month with ${sel.monthsLeft} months remaining. Monitor — do not increase order quantity.`}
                    {sel.status==="healthy"&&`✅ Strong performer at ${sel.velocity} units/month. Consider increasing reorder buffer to avoid stockouts.`}
                  </div>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function App() {

  const gloves = analyze(GLOVES_DATA);

      setLoading(true);

          <div style={{fontSize:26,fontWeight:800,fontFamily:"'Playfair Display',serif",color:"#fff",letterSpacing:-0.5}}>ShelfCaddie</div>
          <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:3,marginTop:4}}>INVENTORY INTELLIGENCE</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div>
            <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>EMAIL</div>
            <input value={user} onChange={e=>{setUser(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="headpro@legacygolf.com" style={{width:"100%",background:"#111",border:"1px solid #222",borderRadius:10,padding:"12px 14px",color:"#ddd",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}/>
          </div>
          <div>
            <div style={{fontSize:10,color:"#555",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:6}}>PASSWORD</div>
            <input type="password" value={pass} onChange={e=>{setPass(e.target.value);setError("");}} onKeyDown={e=>e.key==="Enter"&&login()} placeholder="••••••••••••" style={{width:"100%",background:"#111",border:"1px solid #222",borderRadius:10,padding:"12px 14px",color:"#ddd",fontSize:13,fontFamily:"'DM Sans',sans-serif"}}/>
          </div>
          {error && <div style={{fontSize:12,color:"#ff4444",fontFamily:"'DM Mono',monospace",textAlign:"center"}}>{error}</div>}
          <button onClick={login} style={{background:"linear-gradient(135deg,#1a4a2e,#2d7a4f)",border:"none",borderRadius:10,padding:"14px",color:"#fff",fontSize:14,fontWeight:600,fontFamily:"'DM Sans',sans-serif",marginTop:6,opacity:loading?0.7:1}}>
            {loading?"Signing in...":"Sign In"}
          </button>
        </div>
        <div style={{textAlign:"center",marginTop:20,fontSize:11,color:"#333",fontFamily:"'DM Mono',monospace"}}>POWERED BY SHELFCADDIE · AI FOR GOLF PRO SHOPS</div>
      </div>
    </div>
  );

  const tabs = [{k:"balls",l:"⛳ Golf Balls",data:balls},{k:"gloves",l:"🧤 Gloves",data:gloves},{k:"bags",l:"🎒 Bags",data:bags}];
  const current = tabs.find(t=>t.k===tab);

  return (
    <div style={{minHeight:"100vh",background:"#080808"}}>
      <div style={{background:"#0a0a0a",borderBottom:"1px solid #1a1a1a",padding:"0 32px",display:"flex",alignItems:"center",justifyContent:"space-between",height:64}}>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <div style={{width:32,height:32,background:"linear-gradient(135deg,#1a4a2e,#2d7a4f)",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>⛳</div>
          <div>
            <div style={{fontSize:18,fontWeight:700,fontFamily:"'Playfair Display',serif",letterSpacing:-0.5,lineHeight:1}}>ShelfCaddie</div>
            <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:2}}>INVENTORY INTELLIGENCE</div>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:16}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:13,color:"#ddd",fontWeight:600}}>Legacy Golf Club</div>
            <div style={{fontSize:10,color:"#444",fontFamily:"'DM Mono',monospace"}}>headpro@legacygolf.com</div>
          </div>
          <button onClick={()=>setLoggedIn(false)} style={{background:"#111",border:"1px solid #222",color:"#666",borderRadius:8,padding:"6px 14px",fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:1}}>SIGN OUT</button>
        </div>
      </div>

      <div style={{padding:"28px 32px",maxWidth:1400,margin:"0 auto"}}>

          <div style={{fontSize:11,color:"#444",fontFamily:"'DM Mono',monospace",letterSpacing:2,marginBottom:4}}>FULL YEAR 2025 · NORTHSTAR POS</div>
          <h1 style={{fontSize:28,fontFamily:"'Playfair Display',serif",fontWeight:800,color:"#fff"}}>Inventory Dashboard</h1>
        </div>

        <div style={{display:"flex",gap:4,marginBottom:24,background:"#0d0d0d",padding:4,borderRadius:12,width:"fit-content",border:"1px solid #1a1a1a"}}>
          {tabs.map(t=>(
            <button key={t.k} onClick={()=>setTab(t.k)} style={{background:tab===t.k?"#1e1e1e":"transparent",border:tab===t.k?"1px solid #2a2a2a":"1px solid transparent",color:tab===t.k?"#fff":"#555",borderRadius:8,padding:"8px 20px",fontSize:13,fontFamily:"'DM Sans',sans-serif",fontWeight:500}}>
              {t.l} <span style={{fontSize:10,fontFamily:"'DM Mono',monospace",color:tab===t.k?"#aaa":"#333",marginLeft:4}}>{t.data.length}</span>
            </button>
          ))}
        </div>

        <Table items={current.data}/>

        <div style={{marginTop:28,textAlign:"center",color:"#222",fontSize:11,fontFamily:"'DM Mono',monospace",letterSpacing:2}}>
          SHELFCADDIE · AI INVENTORY INTELLIGENCE FOR GOLF PRO SHOPS · © 2026

      </div>

}
